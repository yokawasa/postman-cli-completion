name: release

on:
  push:
    branches: [main]
    paths: ["spec/commands.json"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Follows the official npm Trusted Publishing recipe (https://docs.npmjs.com/trusted-publishers).
      # setup-node MUST be v6+: v4 defaulted a dummy NODE_AUTH_TOKEN and wrote `always-auth`,
      # which shadowed OIDC and made npm publish anonymously → `404 Not Found` on the PUT
      # (setup-node issue #1440). v6 removed that behavior, so `registry-url` + no token works.
      # `package-manager-cache: false` disables dependency caching for a clean release build.
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Read version from spec
        id: ver
        run: |
          V=$(node -p "require('./spec/commands.json').postmanCliVersion")
          echo "tag=v$V"     >> "$GITHUB_OUTPUT"
          echo "version=$V"  >> "$GITHUB_OUTPUT"

      - name: Check whether the tag already exists
        id: exists
        run: |
          if git rev-parse "refs/tags/${{ steps.ver.outputs.tag }}" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Tag and release
        if: steps.exists.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag ${{ steps.ver.outputs.tag }}
          git push origin ${{ steps.ver.outputs.tag }}
          gh release create ${{ steps.ver.outputs.tag }} \
            --title "${{ steps.ver.outputs.tag }}" \
            --notes "Updated to support Postman CLI ${{ steps.ver.outputs.tag }}." \
            completions/zsh/_postman \
            completions/bash/postman.bash \
            completions/fish/postman.fish

      - name: Check whether this version is already on npm
        id: npm_exists
        run: |
          if npm view "postman-cli-completion@${{ steps.ver.outputs.version }}" version >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      # Publishing uses npm Trusted Publishing (OIDC) — no NPM_TOKEN. npm exchanges the
      # GitHub Actions OIDC token (needs `id-token: write`, set above) for a short-lived,
      # package-scoped credential, and attaches provenance automatically. Requirements:
      #   1. npm CLI >= 11.5.1 (Node 24's bundled npm may be older, so we upgrade below).
      #   2. A Trusted Publisher configured on npmjs.com for this package, pointing at
      #      repo yokawasa/postman-cli-completion + workflow "release.yml" (no environment).
      # See docs/npm-distribution.md §5.
      - name: Publish to npm (OIDC trusted publishing)
        if: steps.npm_exists.outputs.skip != 'true'
        run: |
          npm install -g npm@latest
          npm version "${{ steps.ver.outputs.version }}" --no-git-tag-version --allow-same-version
          npm publish --provenance --access public
